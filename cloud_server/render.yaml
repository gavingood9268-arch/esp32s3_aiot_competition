services:
  - type: web
    name: esp32-aiot-cloud
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: BAILIAN_MODEL
        value: qwen3.7-max
      - key: BAILIAN_BASE_URL
        value: https://ws-t2igo4r0mezggvl0.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
      - key: BAILIAN_API_KEY
        sync: false
